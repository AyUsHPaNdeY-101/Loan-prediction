<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Predictor</title>
</head>
<body>
    <h1>Loan Predictor</h1>   
    <form action="/predict" method="post">
        <label for="age">Age:</label>
        <input type="number" step="any" id="age" name="age" required><br><br>
        <label for="income">Income:</label>
        <input type="number" step="any" id="income" name="income" required><br><br>
        <label for="creditscore">Credit Score:</label>
        <input type="number" step="any" id="creditscore" name="creditscore" required><br><br>
        <label for="loanamount">Loan Amount:</label>
        <input type="number" step="any" id="loanamount" name="loanamount" required><br><br>
        <button type="submit" value="Predict">Predict</button>
    </form>
    
    {% if prediction_text %}
        <h3>Prediction Result:</h3>
        <p>{{ prediction_text }}</p>
    {% endif %} 
</body>
</html>
